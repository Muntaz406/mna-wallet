<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNA Wallet VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h2>MNA Wallet</h2>
        <select id="networkSelect">
            <option value="BSC">BSC (BEP20)</option>
            <option value="ETH">Ethereum (ERC20)</option>
            <option value="TRX">Tron (TRC20)</option>
        </select>
    </div>

    <div class="card">
        <p>Total Saldo Aktif</p>
        <h1 id="totalBalance">Rp 0</h1>
        <p id="pnlDisplay" class="pnl">PNL: Menghitung...</p>
    </div>

    <div class="action-buttons">
        <button onclick="simulateTransfer('Send')">Kirim</button>
        <button onclick="simulateTransfer('Receive')">Terima</button>
        <button onclick="scanQRIS()">📷 Scan QRIS</button>
    </div>

    <div class="history-section">
        <h3>Riwayat Transaksi</h3>
        <ul id="historyList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
